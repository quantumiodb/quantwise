<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>QuantWise Browser Relay — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      min-width: 320px;
      color: #333;
      background: #fafafa;
    }
    h2 { margin: 0 0 16px; font-size: 16px; }
    label { display: block; margin: 12px 0 4px; font-size: 13px; font-weight: 500; }
    input {
      width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 14px; box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #6366f1; }
    .hint { font-size: 11px; color: #888; margin-top: 2px; }
    button {
      margin-top: 16px; padding: 8px 20px; background: #6366f1; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #4f46e5; }
    button.saved { background: #4CAF50; }
    button.saved:hover { background: #43A047; }
  </style>
</head>
<body>
  <h2>QuantWise Browser Relay</h2>

  <label for="port">Relay Port</label>
  <input id="port" type="number" value="18792" min="1024" max="65535">
  <div class="hint">Must match BROWSER_RELAY_PORT in .env (default: 18792)</div>

  <label for="token">Auth Token</label>
  <input id="token" type="password" placeholder="Paste your BROWSER_RELAY_TOKEN here">
  <div class="hint">Must match BROWSER_RELAY_TOKEN in .env</div>

  <button id="save">Save</button>
  <script src="options.js"></script>
</body>
</html>
